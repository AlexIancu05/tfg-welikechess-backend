version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis_django
    restart: always
    expose:
      - "6379"

  web:
    build: .
    container_name: django_backend
    restart: always
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - redis
    volumes:
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - ADMIN_ALLOWED_IP=${ADMIN_ALLOWED_IP}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template
      - static_volume:/app/staticfiles
    depends_on:
      - web

volumes:
  static_volume: